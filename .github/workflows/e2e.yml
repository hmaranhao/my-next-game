name: E2E Playwright

on:
  push:
    branches: [main]
    paths:
      - "projects/my-next-game/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "projects/my-next-game/**"

defaults:
  run:
    working-directory: projects/my-next-game

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/my-next-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          USE_SAMPLE_GAME_DATA: "true"
          STEAM_API_KEY: e2e-ci-dummy
