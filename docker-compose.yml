services:
  db:
    image: pgvector/pgvector:pg16
    container_name: my-next-game-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_next_game
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_next_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
